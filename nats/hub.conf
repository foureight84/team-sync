# ---------------------------------------------------------------------------
# Central NATS Hub  (cloud / central server)
#
# The single authoritative broker. JetStream persists every OKF context delta
# so any agent that was temporarily offline can replay what it missed.
#
# Run:  nats-server -c nats/hub.conf
# ---------------------------------------------------------------------------

server_name: team-sync-hub
listen: 0.0.0.0:4222

# Persist structural/context deltas to disk for replay.
jetstream {
  store_dir: "./.nats/hub-store"
  max_memory_store: 256MB
  max_file_store: 4GB
}

# Accounts keep system traffic isolated from app traffic.
accounts {
  SYNC: {
    jetstream: enabled
    users: [
      # In production, replace with NKEY/JWT auth or per-developer credentials.
      { user: "agent", password: "$SYNC_HUB_PASSWORD" }
    ]
  }
}

# Port that local leaf nodes dial into. TLS strongly recommended in production.
leafnodes {
  listen: 0.0.0.0:7422
}

# Monitoring endpoint (http://host:8222/varz, /jsz).
http_port: 8222
