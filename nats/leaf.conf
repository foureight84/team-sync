# ---------------------------------------------------------------------------
# Local NATS Leaf Node  (developer machine)
#
# Runs as a local daemon. Agents broadcast to localhost:4222 and get an instant
# ack with zero network round-trip — even if the laptop is offline. The leaf
# node buffers locally and transparently syncs with the Central Hub the moment
# connectivity returns.
#
# Run:  nats-server -c nats/leaf.conf
# ---------------------------------------------------------------------------

server_name: team-sync-leaf

# Agents and the sync-daemon connect here on localhost.
listen: 127.0.0.1:4222

# A leaf node needs its own JetStream domain so local publishes are durable
# even while disconnected; they reconcile upward when the link is live.
jetstream {
  store_dir: "./.nats/leaf-store"
  domain: leaf
  max_file_store: 1GB
}

# Outbound link to the Central Hub's leafnodes port.
leafnodes {
  remotes: [
    {
      url: "nats-leaf://agent:$SYNC_HUB_PASSWORD@$SYNC_HUB_HOST:7422"
      account: "SYNC"
    }
  ]
}

http_port: 8223
